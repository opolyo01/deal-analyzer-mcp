<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Saved Deals — Deal Analyzer</title>
  <link rel="stylesheet" href="/deal-ui.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">DA</div>
        <div>
          <div class="brand-title">Deal Analyzer</div>
          <div class="brand-subtitle">Rental underwriting without a spreadsheet</div>
        </div>
      </div>
      <nav class="nav" aria-label="Main navigation">
        <a href="/">Home</a>
        <a href="/deal-widget.html">Quick Check</a>
        <a href="/add.html">Full Analysis</a>
        <a href="/dashboard" aria-current="page">Saved Deals</a>
        <a href="/agent.html">Talk to Tonya</a>
        <span id="user-label" style="opacity:0.6;font-size:0.85em;align-self:center"></span>
        <a href="/auth/google" id="signin-link" style="display:none">Sign in</a>
        <a href="/logout" id="logout-link" style="display:none">Log out</a>
      </nav>
    </header>

    <main class="page">
      <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:12px;margin-bottom:20px">
        <div>
          <h1 style="margin-bottom:4px">Saved Deals</h1>
          <p class="lead" style="margin:0">Your ranked pipeline.</p>
        </div>
        <a href="/add.html" class="button primary">+ New analysis</a>
      </div>

      <section class="stats" id="stats" aria-label="Saved deal summary"></section>

      <div class="deal-list" id="deal-list"></div>
    </main>
  </div>

  <script>
    fetch('/whoami').then(r => r.json()).then(user => {
      if (user) {
        document.getElementById('user-label').textContent = user.displayName || user.email || '';
        document.getElementById('logout-link').style.display = '';
        loadDeals().catch(() => { renderStats([]); renderDeals([]); });
      } else {
        document.getElementById('signin-link').style.display = '';
        renderStats([]);
        document.getElementById('deal-list').innerHTML = `
          <div class="empty-state" style="padding:32px;text-align:center">
            <p style="margin-bottom:16px"><a href="/auth/google">Sign in</a> to save and view your deals.</p>
            <a href="/deal-widget.html" class="button primary">Try Quick Check free</a>
          </div>`;
      }
    });

    async function loadDeals() {
      const res = await fetch('/deals');
      const data = await res.json();
      const deals = Array.isArray(data) ? data : [];
      renderStats(deals);
      renderDeals(deals);
    }

    function renderStats(deals) {
      const count = deals.length;
      const buys = deals.filter(d => d.analysis?.summary?.recommendation === 'BUY').length;
      const avgScore = count ? (deals.reduce((s, d) => s + Number(d.analysis?.summary?.score || 0), 0) / count).toFixed(1) : '0.0';
      const best = [...deals].sort((a, b) => Number(b.analysis?.summary?.score || 0) - Number(a.analysis?.summary?.score || 0))[0];
      document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="stat-label">Saved</div><div class="stat-value">${count}</div></div>
        <div class="stat"><div class="stat-label">Buy rated</div><div class="stat-value">${buys}</div></div>
        <div class="stat"><div class="stat-label">Avg score</div><div class="stat-value">${avgScore}</div></div>
        <div class="stat"><div class="stat-label">Top deal</div><div class="stat-value" style="font-size:16px">${best ? escHtml(best.label || best.input?.label || 'Deal') : '—'}</div></div>
      `;
    }

    function renderDeals(deals) {
      const list = document.getElementById('deal-list');
      if (!deals.length) {
        list.innerHTML = `
          <div class="empty-state" style="padding:32px;text-align:center">
            <p style="margin-bottom:16px">No saved deals yet.</p>
            <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
              <a href="/deal-widget.html" class="button primary">Quick Check</a>
              <a href="/add.html" class="button">Full Analysis</a>
            </div>
          </div>`;
        return;
      }

      deals.sort((a, b) => {
        const s = Number(b.analysis?.summary?.score || 0) - Number(a.analysis?.summary?.score || 0);
        return s || Number(b.analysis?.summary?.monthlyCashFlow || 0) - Number(a.analysis?.summary?.monthlyCashFlow || 0);
      });

      list.innerHTML = deals.map((deal, i) => {
        const summary = deal.analysis?.summary || {};
        const input = deal.analysis?.input || deal.input || {};
        const cls = recClass(summary.recommendation);
        return `
          <article class="deal-item ${cls}" data-id="${escHtml(deal.id)}">
            <div class="deal-head">
              <div>
                <div class="deal-name">${i + 1}. ${escHtml(deal.label || input.label || input.address || 'Deal')}</div>
                <div class="deal-meta">${escHtml(input.address || input.propertyType || 'Saved deal')}</div>
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                <div class="pill ${cls}">${Number(summary.score || 0)}/10 ${escHtml(summary.recommendation || 'HOLD')}</div>
                <button class="delete-btn" data-id="${escHtml(deal.id)}" title="Delete" style="min-height:32px;padding:4px 10px;font-size:0.8em;border-color:#e0a0a0;color:#c44">&#x2715;</button>
              </div>
            </div>
            <div class="deal-metrics">
              <div><div class="metric-label">After debt</div><strong>${currency(summary.monthlyCashFlow)}</strong></div>
              <div><div class="metric-label">Before principal</div><strong>${currency(summary.monthlyCashFlowBeforePrincipal)}</strong></div>
              <div><div class="metric-label">Rent</div><strong>${currency(input.rent)}</strong></div>
              <div><div class="metric-label">Cap rate</div><strong>${percent(summary.capRate)}</strong></div>
            </div>
          </article>`;
      }).join('');

      list.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async e => {
          e.stopPropagation();
          if (!confirm('Delete this deal?')) return;
          const res = await fetch(`/deals/${btn.dataset.id}`, { method: 'DELETE' });
          if (res.ok) {
            btn.closest('article').remove();
            if (!list.querySelector('.deal-item')) renderDeals([]);
          }
        });
      });
    }

    function recClass(v) { const r = String(v || '').toLowerCase(); return r === 'buy' ? 'buy' : r === 'pass' ? 'pass' : 'hold'; }
    function currency(v) { const n = Number(v || 0); return (n < 0 ? '-' : '') + '$' + Math.abs(Math.round(n)).toLocaleString('en-US'); }
    function percent(v) { return v == null ? '-' : (Number(v) * 100).toFixed(1) + '%'; }
    function escHtml(v) { return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  </script>
</body>
</html>
