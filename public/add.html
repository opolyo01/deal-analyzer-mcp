<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Full Analysis — Deal Analyzer</title>
  <link rel="icon" href="/icon.png" />
  <link rel="stylesheet" href="/deal-ui.css" />
  <style>
    .analyze-layout {
      display: grid;
      grid-template-columns: minmax(320px, 0.9fr) minmax(0, 1.1fr);
      gap: 20px;
      align-items: start;
    }
    .left-col { display: grid; gap: 16px; }
    .result-sticky {
      position: sticky;
      top: 88px;
      max-height: calc(100vh - 108px);
      overflow-y: auto;
      scrollbar-width: thin;
    }
    .result-photo {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 16px;
      display: block;
    }
    details > summary { list-style: none; cursor: pointer; user-select: none; }
    details > summary::-webkit-details-marker { display: none; }
    .advanced-summary {
      color: var(--blue);
      font-size: 13px;
      font-weight: 700;
      padding: 6px 0 2px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .advanced-summary::before { content: '▸'; transition: transform .15s; }
    details[open] .advanced-summary::before { transform: rotate(90deg); }
    .result-panel h2 { font-size: 18px; margin-bottom: 12px; }
    .form-panel h2 { font-size: 18px; margin-bottom: 12px; }
    @keyframes result-pop {
      0% { opacity: 0; transform: translateY(6px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .result-animate { animation: result-pop .25s ease; }
    @media (max-width: 860px) {
      .analyze-layout { grid-template-columns: 1fr; }
      .result-sticky { position: static; max-height: none; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">DA</div>
      <div>
        <div class="brand-title">Deal Analyzer</div>
        <div class="brand-subtitle">Full analysis</div>
      </div>
    </div>
    <nav class="nav" aria-label="Main navigation">
      <a href="/">Home</a>
      <a href="/deal-widget.html">Quick Check</a>
      <a href="/add.html" aria-current="page">Full Analysis</a>
      <a href="/dashboard">Saved Deals</a>
      <span id="user-label" style="opacity:0.6;font-size:0.85em;align-self:center"></span>
      <a href="/auth/google" id="signin-link" style="display:none" class="button primary">Sign in</a>
      <a href="/logout" id="logout-link" style="display:none">Log out</a>
    </nav>
  </header>

  <main class="page">
    <div class="analyze-layout">

      <!-- LEFT: import bar + form -->
      <div class="left-col">
        <div class="panel" id="import-bar">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <input id="listing-url" type="url" placeholder="Paste a Zillow or Redfin URL to auto-fill" style="flex:1;min-width:180px" />
            <button type="button" id="import-btn" class="primary">Import</button>
          </div>
          <div class="status" id="import-status" aria-live="polite"></div>
        </div>

        <form class="panel form-panel" id="deal-form">
          <h2>Deal inputs</h2>
          <div class="form-grid">
            <div class="field full">
              <label for="label">Deal label</label>
              <input id="label" placeholder="Oak Avenue rental" autocomplete="off" />
            </div>
            <div class="field full">
              <label for="address">Address</label>
              <input id="address" placeholder="123 Oak Ave, Raleigh, NC" />
            </div>
            <div class="field">
              <label for="price">Purchase price</label>
              <input id="price" inputmode="decimal" placeholder="425000" required />
            </div>
            <div class="field">
              <label for="rent">Monthly rent</label>
              <input id="rent" inputmode="decimal" placeholder="3200" />
            </div>
            <div class="field">
              <label for="taxes">Annual taxes</label>
              <input id="taxes" inputmode="decimal" placeholder="6100" />
            </div>
            <div class="field">
              <label for="insurance">Annual insurance</label>
              <input id="insurance" inputmode="decimal" placeholder="2100" />
            </div>
            <div class="field">
              <label for="hoa">Monthly HOA</label>
              <input id="hoa" inputmode="decimal" placeholder="0" />
            </div>
            <div class="field">
              <label for="propertyType">Property type</label>
              <select id="propertyType">
                <option value="">Select type</option>
                <option>Single family</option>
                <option>Duplex</option>
                <option>Triplex</option>
                <option>Multifamily</option>
                <option>Condo</option>
                <option>Townhouse</option>
              </select>
            </div>
          </div>

          <details style="margin-top:12px">
            <summary class="advanced-summary">Advanced assumptions</summary>
            <div class="form-grid" style="margin-top:12px">
              <div class="field">
                <label for="otherMonthlyCosts">Other monthly costs</label>
                <input id="otherMonthlyCosts" inputmode="decimal" placeholder="0" />
              </div>
              <div class="field">
                <label for="downPaymentPercent">Down payment %</label>
                <input id="downPaymentPercent" inputmode="decimal" placeholder="20" />
              </div>
              <div class="field">
                <label for="rate">Interest rate %</label>
                <input id="rate" inputmode="decimal" placeholder="6.5" />
              </div>
              <div class="field">
                <label for="termYears">Loan term (years)</label>
                <input id="termYears" inputmode="numeric" placeholder="30" />
              </div>
              <div class="field">
                <label for="vacancyRate">Vacancy reserve %</label>
                <input id="vacancyRate" inputmode="decimal" placeholder="5" />
              </div>
              <div class="field">
                <label for="repairsRate">Repairs reserve %</label>
                <input id="repairsRate" inputmode="decimal" placeholder="5" />
              </div>
              <div class="field">
                <label for="capexRate">Capex reserve %</label>
                <input id="capexRate" inputmode="decimal" placeholder="5" />
              </div>
              <div class="field">
                <label for="managementRate">Management %</label>
                <input id="managementRate" inputmode="decimal" placeholder="8" />
              </div>
            </div>
          </details>

          <div class="actions">
            <button class="primary" type="submit" data-action="save">Analyze and save</button>
            <button type="submit" data-action="analyze">Analyze only</button>
            <a class="button secondary" href="/dashboard">Saved Deals</a>
          </div>
          <div class="status" id="status" aria-live="polite"></div>
        </form>
      </div>

      <!-- RIGHT: sticky result -->
      <div class="result-sticky" id="result-col">
        <section class="panel result-panel" aria-live="polite">
          <img id="listing-photo-img" src="" alt="Listing photo" class="result-photo" style="display:none" />
          <h2>Result</h2>
          <div id="result">
            <div class="empty-state">Paste a URL or fill in the form, then click Analyze.</div>
          </div>
        </section>
      </div>

    </div>
  </main>

  <script>
    let signedIn = false;
    fetch('/whoami').then(r => r.json()).then(user => {
      if (user) {
        signedIn = true;
        document.getElementById('user-label').textContent = user.displayName || user.email || '';
        document.getElementById('logout-link').style.display = '';
      } else {
        document.getElementById('signin-link').style.display = '';
      }
    });

    document.getElementById('import-btn').addEventListener('click', async () => {
      const url = document.getElementById('listing-url').value.trim();
      const importStatus = document.getElementById('import-status');
      if (!url) { importStatus.textContent = 'Paste a listing URL first.'; return; }
      importStatus.textContent = 'Fetching listing…';
      document.getElementById('import-btn').disabled = true;
      try {
        const res = await fetch('/parse-listing', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to parse listing.');
        ['price', 'rent', 'taxes', 'insurance', 'hoa'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.value = '';
        });
        fillForm(data);
        if (data.fetchFailed) {
          importStatus.textContent = `⚠ ${data.fetchError} Address pre-filled from URL.`;
          importStatus.style.color = 'var(--gold)';
        } else {
          importStatus.textContent = 'Form filled — review and adjust before analyzing.';
          importStatus.style.color = '';
        }
      } catch (err) {
        importStatus.textContent = err.message || 'Could not parse that URL.';
      } finally {
        document.getElementById('import-btn').disabled = false;
      }
    });

    function fillForm(data) {
      const setField = (id, value) => {
        if (value == null || value === '') return;
        const el = document.getElementById(id);
        if (el) el.value = value;
      };
      setField('address', data.address);
      setField('label', data.address || '');
      setField('price', data.price);
      setField('rent', data.rent);
      setField('taxes', data.taxes);
      setField('hoa', data.hoa);
      setField('insurance', data.insurance);
      if (data.propertyType) {
        const sel = document.getElementById('propertyType');
        const match = Array.from(sel.options).find(o => o.value.toLowerCase().includes(data.propertyType.toLowerCase()));
        if (match) sel.value = match.value;
      }
      const photoImg = document.getElementById('listing-photo-img');
      if (data.photoUrl) {
        photoImg.src = data.photoUrl;
        photoImg.style.display = '';
      } else {
        photoImg.style.display = 'none';
      }
    }

    const form = document.getElementById('deal-form');
    const statusEl = document.getElementById('status');
    let action = 'save';

    form.querySelectorAll('button[type="submit"]').forEach((button) => {
      button.addEventListener('click', () => {
        action = button.dataset.action || 'save';
      });
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const payload = readPayload();
      if (!payload.price) {
        statusEl.textContent = 'Purchase price is required.';
        return;
      }
      if (action === 'save' && !signedIn) {
        window.location.href = '/auth/google';
        return;
      }

      try {
        statusEl.textContent = action === 'save' ? 'Analyzing and saving...' : 'Analyzing...';
        const data = action === 'save' ? await saveDeal(payload) : await analyzeDeal(payload);
        if (!data) return;
        renderResult(action === 'save' ? data.analysis : data, data.id);
        statusEl.textContent = action === 'save' ? 'Deal saved. View it in Saved Deals.' : 'Analysis ready.';
        // Scroll result into view on mobile; on desktop it's already sticky/visible
        if (window.innerWidth <= 860) {
          document.getElementById('result-col').scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
          document.getElementById('result-col').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      } catch (error) {
        statusEl.textContent = error.message || 'Something went wrong.';
      }
    });

    function numberValue(id) {
      const raw = document.getElementById(id).value.trim().replace(/[$,%\s,]/g, '');
      if (!raw) return null;
      const value = Number(raw);
      return Number.isFinite(value) ? value : null;
    }

    function textValue(id) {
      return document.getElementById(id).value.trim();
    }

    function readPayload() {
      const downPaymentPercent = numberValue('downPaymentPercent');
      const rate = numberValue('rate');
      const vacancyRate = numberValue('vacancyRate');
      const repairsRate = numberValue('repairsRate');
      const capexRate = numberValue('capexRate');
      const managementRate = numberValue('managementRate');
      return stripEmpty({
        label: textValue('label'),
        address: textValue('address'),
        price: numberValue('price'),
        rent: numberValue('rent'),
        taxes: numberValue('taxes'),
        insurance: numberValue('insurance'),
        hoa: numberValue('hoa'),
        otherMonthlyCosts: numberValue('otherMonthlyCosts'),
        vacancyRate: vacancyRate == null ? null : vacancyRate / 100,
        repairsRate: repairsRate == null ? null : repairsRate / 100,
        capexRate: capexRate == null ? null : capexRate / 100,
        managementRate: managementRate == null ? null : managementRate / 100,
        downPaymentPercent: downPaymentPercent == null ? null : downPaymentPercent / 100,
        rate: rate == null ? null : rate / 100,
        termYears: numberValue('termYears'),
        propertyType: textValue('propertyType')
      });
    }

    function stripEmpty(input) {
      return Object.fromEntries(Object.entries(input).filter(([, value]) => value !== '' && value != null));
    }

    async function analyzeDeal(payload) {
      const res = await fetch('/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to analyze deal.');
      return data;
    }

    async function saveDeal(payload) {
      const res = await fetch('/saveDeal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (res.status === 401 && data.loginUrl) { window.location.href = data.loginUrl; return; }
      if (res.status === 402 && data.upgradeUrl) { window.location.href = data.upgradeUrl; return; }
      if (!res.ok) throw new Error(data.message || data.error || 'Failed to save deal.');
      return data;
    }

    function renderResult(analysis, savedId) {
      const summary = analysis.summary || {};
      const input = analysis.input || {};
      const cls = recClass(summary.recommendation);
      const resultEl = document.getElementById('result');
      resultEl.innerHTML = `
        <div class="recommendation ${cls}">${escapeHtml(summary.recommendation || 'HOLD')} - ${Number(summary.score || 0)}/10</div>
        <div class="result-grid">
          <div class="metric"><div class="metric-label">Cash flow after debt</div><div class="metric-value">${currency(summary.monthlyCashFlow)}</div></div>
          <div class="metric"><div class="metric-label">Cash flow before principal</div><div class="metric-value">${currency(summary.monthlyCashFlowBeforePrincipal)}</div></div>
          <div class="metric"><div class="metric-label">Cap rate</div><div class="metric-value">${percent(summary.capRate)}</div></div>
          <div class="metric"><div class="metric-label">Cash-on-cash</div><div class="metric-value">${percent(summary.cashOnCashReturn)}</div></div>
          <div class="metric"><div class="metric-label">Break-even rent</div><div class="metric-value">${currency(summary.breakEvenRent)}</div></div>
          <div class="metric"><div class="metric-label">Rent used</div><div class="metric-value">${currency(input.rent)}</div></div>
          <div class="metric"><div class="metric-label">Principal paydown</div><div class="metric-value">${currency(summary.monthlyPrincipalPaydown)}</div></div>
          <div class="metric"><div class="metric-label">Interest portion</div><div class="metric-value">${currency(summary.monthlyInterest)}</div></div>
        </div>
        ${expenseBreakdownHtml(summary)}
        ${savedId ? `<p class="status">Saved as ${escapeHtml(savedId)}</p>` : ''}
      `;
      resultEl.classList.remove('result-animate');
      void resultEl.offsetWidth;
      resultEl.classList.add('result-animate');
    }

    function expenseBreakdownHtml(summary) {
      const items = summary.monthlyExpenseBreakdown || {};
      const debtPayment = items.debtPayment ?? items.mortgage ?? summary.monthlyMortgage;
      return `
        <div class="breakdown">
          <div class="breakdown-row"><span>Debt payment (P&I)</span><strong>${currency(debtPayment)}</strong></div>
          <div class="breakdown-row sub"><span>Interest portion</span><strong>${currency(items.interest ?? summary.monthlyInterest)}</strong></div>
          <div class="breakdown-row sub"><span>Principal paydown</span><strong>${currency(items.principalPaydown ?? summary.monthlyPrincipalPaydown)}</strong></div>
          <div class="breakdown-row"><span>Taxes</span><strong>${currency(items.taxes)}</strong></div>
          <div class="breakdown-row"><span>Insurance</span><strong>${currency(items.insurance)}</strong></div>
          <div class="breakdown-row"><span>HOA</span><strong>${currency(items.hoa)}</strong></div>
          <div class="breakdown-row"><span>Other monthly costs</span><strong>${currency(items.otherMonthlyCosts)}</strong></div>
          <div class="breakdown-row"><span>Vacancy reserve</span><strong>${currency(items.vacancy)}</strong></div>
          <div class="breakdown-row"><span>Repairs reserve</span><strong>${currency(items.repairs)}</strong></div>
          <div class="breakdown-row"><span>Capex reserve</span><strong>${currency(items.capex)}</strong></div>
          <div class="breakdown-row"><span>Management</span><strong>${currency(items.management)}</strong></div>
          <div class="breakdown-row total"><span>Total monthly cash outflow</span><strong>${currency(summary.monthlyAllInCost)}</strong></div>
          <div class="breakdown-row total equity"><span>Cost before principal</span><strong>${currency(summary.monthlyCostBeforePrincipal)}</strong></div>
        </div>
        <p class="breakdown-note">Cash flow before principal treats principal paydown as equity, while cash flow after debt counts the full P&amp;I payment.</p>
      `;
    }

    function recClass(value) {
      const rec = String(value || '').toLowerCase();
      if (rec === 'buy') return 'buy';
      if (rec === 'pass') return 'pass';
      return 'hold';
    }

    function currency(value) {
      const number = Number(value || 0);
      const sign = number < 0 ? '-' : '';
      return sign + '$' + Math.abs(Math.round(number)).toLocaleString('en-US');
    }

    function percent(value) {
      return value == null ? '-' : (Number(value) * 100).toFixed(1) + '%';
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[char]));
    }
  </script>
</body>
</html>
