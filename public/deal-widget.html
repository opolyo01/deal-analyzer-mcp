<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quick Check — Deal Analyzer</title>
  <link rel="stylesheet" href="/deal-ui.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">DA</div>
        <div>
          <div class="brand-title">Deal Analyzer</div>
          <div class="brand-subtitle">Rental underwriting without a spreadsheet</div>
        </div>
      </div>
      <nav class="nav" aria-label="Main navigation">
        <a href="/">Home</a>
        <a href="/deal-widget.html" aria-current="page">Quick Check</a>
        <a href="/add.html">Full Analysis</a>
        <a href="/dashboard">Saved Deals</a>
        <a href="/agent.html">Talk to Tonya</a>
        <span id="user-label" style="opacity:0.6;font-size:0.85em;align-self:center"></span>
        <a href="/auth/google" id="signin-link" style="display:none">Sign in</a>
        <a href="/logout" id="logout-link" style="display:none">Log out</a>
      </nav>
    </header>

    <main>
      <div class="compact-page">
        <section class="panel">
          <h1>Quick Check</h1>
          <p class="lead">A fast first pass — enter price and rent for an instant score.</p>

          <form id="quick-form" style="margin-top: 18px;">
            <div class="form-grid">
              <div class="field">
                <label for="price">Purchase price</label>
                <input id="price" inputmode="decimal" placeholder="350000" required />
              </div>
              <div class="field">
                <label for="rent">Monthly rent</label>
                <input id="rent" inputmode="decimal" placeholder="2850" />
              </div>
              <div class="field">
                <label for="taxes">Annual taxes</label>
                <input id="taxes" inputmode="decimal" placeholder="5200" />
              </div>
              <div class="field">
                <label for="insurance">Annual insurance</label>
                <input id="insurance" inputmode="decimal" placeholder="1800" />
              </div>
            </div>
            <div class="actions">
              <button class="primary" type="submit">Analyze</button>
              <a class="button" href="/add.html">Full Analysis</a>
              <a class="button secondary" href="/dashboard">Saved Deals</a>
            </div>
            <div class="status" id="status" aria-live="polite"></div>
          </form>

          <div class="compact-result" id="result">
            <div class="empty-state">Enter a price to calculate a quick score.</div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    fetch('/whoami').then(r => r.json()).then(user => {
      if (user) {
        document.getElementById('user-label').textContent = user.displayName || user.email || '';
        document.getElementById('logout-link').style.display = '';
      } else {
        document.getElementById('signin-link').style.display = '';
      }
    });

    document.getElementById('quick-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const payload = readPayload();
      if (!payload.price) {
        document.getElementById('status').textContent = 'Purchase price is required.';
        return;
      }
      try {
        document.getElementById('status').textContent = 'Analyzing...';
        const res = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to analyze deal.');
        render(data);
        document.getElementById('status').textContent = 'Analysis ready.';
      } catch (error) {
        document.getElementById('status').textContent = error.message || 'Something went wrong.';
      }
    });

    window.addEventListener('message', (event) => {
      const data = event.data?.structuredContent;
      if (data?.summary) render(data);
    });

    function readPayload() {
      return stripEmpty({
        price: numberValue('price'),
        rent: numberValue('rent'),
        taxes: numberValue('taxes'),
        insurance: numberValue('insurance')
      });
    }

    function numberValue(id) {
      const raw = document.getElementById(id).value.trim().replace(/[$,%\s,]/g, '');
      if (!raw) return null;
      const value = Number(raw);
      return Number.isFinite(value) ? value : null;
    }

    function stripEmpty(input) {
      return Object.fromEntries(Object.entries(input).filter(([, value]) => value != null));
    }

    function render(analysis) {
      const summary = analysis.summary || {};
      const input = analysis.input || {};
      const cls = recClass(summary.recommendation);
      document.getElementById('result').innerHTML = `
        <div class="recommendation ${cls}">${escapeHtml(summary.recommendation || 'HOLD')} - ${Number(summary.score || 0)}/10</div>
        <div class="result-grid">
          <div class="metric"><div class="metric-label">After debt</div><div class="metric-value">${currency(summary.monthlyCashFlow)}</div></div>
          <div class="metric"><div class="metric-label">Before principal</div><div class="metric-value">${currency(summary.monthlyCashFlowBeforePrincipal)}</div></div>
          <div class="metric"><div class="metric-label">Principal paydown</div><div class="metric-value">${currency(summary.monthlyPrincipalPaydown)}</div></div>
          <div class="metric"><div class="metric-label">Cap rate</div><div class="metric-value">${percent(summary.capRate)}</div></div>
          <div class="metric"><div class="metric-label">Break-even rent</div><div class="metric-value">${currency(summary.breakEvenRent)}</div></div>
          <div class="metric"><div class="metric-label">Rent used</div><div class="metric-value">${currency(input.rent)}</div></div>
        </div>
        <div style="margin-top:16px;display:flex;flex-wrap:wrap;gap:10px">
          <a href="/add.html" class="button primary">Full Analysis</a>
          <a href="/dashboard" class="button">Save this deal</a>
          <a href="/agent.html" class="button secondary">Talk to Tonya</a>
        </div>
      `;
    }

    function recClass(value) {
      const rec = String(value || '').toLowerCase();
      if (rec === 'buy') return 'buy';
      if (rec === 'pass') return 'pass';
      return 'hold';
    }

    function currency(value) {
      const number = Number(value || 0);
      const sign = number < 0 ? '-' : '';
      return sign + '$' + Math.abs(Math.round(number)).toLocaleString('en-US');
    }

    function percent(value) {
      return value == null ? '-' : (Number(value) * 100).toFixed(1) + '%';
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }
  </script>
</body>
</html>
