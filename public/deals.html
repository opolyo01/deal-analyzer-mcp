<!DOCTYPE html>
<html>
<head>
  <title>Deals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial; padding: 20px; }
    .card { margin: 10px 0; padding: 15px; border-radius: 10px; background: #f4f4f4; }
  </style>
</head>
<body>

<h2>Saved Deals</h2>
<div id="list"></div>

<script>
async function loadDeals() {
  const res = await fetch('/deals');
  const deals = await res.json();

  list.innerHTML = deals.map(d => `
    <div class="card">
      <h3>${d.recommendation}</h3>
      <p>Score: ${d.score}</p>
      <p>Cash Flow: $${d.cashFlow}</p>
    </div>
  `).join('');
}

loadDeals();
</script>

</body>
</html>
